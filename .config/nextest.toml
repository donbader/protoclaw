[profile.default]
# Per-test parallelism (vs cargo test's per-binary default)
test-threads = "num-cpus"
# Fail fast on first failure
fail-fast = true
# Retry flaky tests once before reporting failure
retries = 1
# Slow test warning threshold
slow-timeout = { period = "30s", terminate-after = 3 }

[profile.ci]
# CI: no retries, stricter timeouts
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }
