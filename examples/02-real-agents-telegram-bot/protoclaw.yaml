# Protoclaw Real Agent Example — Docker Workspace (default)
# Opencode runs in an isolated container managed by protoclaw via bollard.
# API keys are baked into the agent image via .opencode/opencode.json
# To switch to local workspace: disable opencode, enable opencode-local,
# update channel agent fields, and add volume mounts back to docker-compose.yml.

log_level: "debug"
extensions_dir: "/usr/local/bin"

agents_manager:
  acp_timeout_secs: 120
  agents:
    # Docker workspace (default) — opencode runs in isolated container
    opencode:
      workspace:
        type: docker
        image: "protoclaw-opencode-agent:latest"
        entrypoint: "@built-in/agents/opencode-wrapper"
        docker_host: "tcp://socket-proxy:2375"
        network: "protoclaw-external"
        working_dir: "/home/node"
        env:
          XDG_CONFIG_HOME: "/home/node/.config"
          XDG_DATA_HOME: "/home/node/.local/share"
      pull_policy: "Never"
      enabled: true
      tools:
        - "system-info"
    # Local workspace (opt-in — for development without Docker agent containers)
    opencode-local:
      workspace:
        type: local
        binary: "@built-in/agents/opencode-wrapper"
        env:
          XDG_CONFIG_HOME: "/home/protoclaw/.config"
          XDG_DATA_HOME: "/home/protoclaw/.local/share"
      args:
        - "acp"
      enabled: false
      tools:
        - "system-info"
    # Claude Code (disabled — see README to switch)
    claude-code:
      workspace:
        type: local
        binary: "claude"
        env:
          CLAUDE_CONFIG_DIR: "/home/protoclaw/.claude"
      args:
        - "--acp"
      enabled: false
      tools:
        - "system-info"

channels_manager:
  channels:
    debug-http:
      binary: "@built-in/channels/debug-http"
      agent: "opencode"
      options:
        HOST: "0.0.0.0"
        PORT: "8080"
      ack:
        reaction: false
        typing: false
    telegram:
      binary: "@built-in/channels/telegram"
      enabled: "${TELEGRAM_ENABLED:false}"
      agent: "opencode"
      options:
        TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:}"
      ack:
        reaction: true
        reaction_emoji: "👀"
        typing: true
        reaction_lifecycle: "remove"

tools_manager:
  tools_server_host: "protoclaw"
  tools:
    system-info:
      binary: "@built-in/tools/system-info"

supervisor:
  shutdown_timeout_secs: 30
  health_check_interval_secs: 5
  max_restarts: 5
  restart_window_secs: 60
