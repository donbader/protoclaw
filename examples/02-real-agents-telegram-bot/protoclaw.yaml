# Protoclaw Real Agent Example
# Uses real AI agents (opencode or claude-code).
# See README.md for setup instructions.

log_level: "debug"
extensions_dir: "/usr/local/bin"

# OpenCode agent (enabled by default)
agents-manager:
  acp_timeout_secs: 120
  agents:
    opencode:
      workspace:
        type: local
        binary: "opencode"
        env:
          XDG_CONFIG_HOME: "/home/protoclaw/.config"
          XDG_DATA_HOME: "/home/protoclaw/.local/share"
      args:
        - "acp"
      enabled: true
      tools:
        - "system-info"
    # Claude Code agent (disabled by default — see README to switch)
    claude-code:
      workspace:
        type: local
        binary: "claude"
        env:
          ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:}"
          CLAUDE_CONFIG_DIR: "/home/protoclaw/.claude"
      args:
        - "--acp"
      enabled: false
      tools:
        - "system-info"

channels-manager:
  # merge_window_ms: 1200  # Batch rapid messages before dispatch (ms, default: 1200, 0 to disable)
  channels:
    debug-http:
      binary: "@built-in/debug-http"
      agent: "opencode"
      ack:
        reaction: false
        typing: false
    telegram:
      binary: "@built-in/telegram-channel"
      enabled: "${TELEGRAM_ENABLED:false}"
      agent: "opencode"
      ack:
        reaction: true
        reaction_emoji: "👀"
        typing: true
        reaction_lifecycle: "remove"

tools-manager:
  tools:
    system-info:
      binary: "@built-in/system-info"

supervisor:
  shutdown_timeout_secs: 30
  health_check_interval_secs: 5
  max_restarts: 5
  restart_window_secs: 60
