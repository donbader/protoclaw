# yaml-language-server: $schema=https://raw.githubusercontent.com/donbader/anyclaw/refs/heads/main/anyclaw.schema.json
# Anyclaw Kiro Example — Docker Workspace
# Kiro CLI runs in an isolated container managed by anyclaw via bollard.
# Auth: set KIRO_API_KEY env var (Pro+), or pre-authenticate and mount ~/.local/share/kiro-cli volume.
# See README.md for both auth flows.
# See ../CONFIGURATION.md for the full config reference.

log_level: "debug,hyper=warn,reqwest=warn,h2=warn,hyper_util=warn,tower=warn"

agents_manager:
  acp_timeout_secs: 120
  agents:
    kiro:
      workspace:
        type: docker
        image: "anyclaw-kiro-agent:latest"
        entrypoint: ["kiro-cli", "acp"]
        docker_host: "tcp://socket-proxy:2375"
        network: "anyclaw-external"
        working_dir: "/home/agent-kiro/workspace"
        pull_policy: "never"
        volumes:
          - "kiro-auth-data:/home/agent-kiro/.local/share/kiro-cli"
          - "kiro-session-data:/home/agent-kiro/.kiro"
          - "kiro-agent-workspace:/home/agent-kiro/workspace"
          - "kiro-agent-packages:/usr/local"
        env:
          KIRO_API_KEY: !env "KIRO_API_KEY:"
      tools:
        - "system-info"

channels_manager:
  channels:
    debug-http:
      binary: "@built-in/channels/debug-http"
      agent: "kiro"
      options:
        host: "0.0.0.0"
        port: "8080"
    telegram:
      binary: "@built-in/channels/telegram"
      enabled: !env "TELEGRAM_ENABLED:false"
      agent: "kiro"
      options:
        bot_token: !env "TELEGRAM_BOT_TOKEN:"
        ack:
          reaction: true
          reaction_emoji: "👀"
          typing: true
          reaction_lifecycle: "remove"

tools_manager:
  tools_server_host: "anyclaw"
  tools:
    system-info:
      binary: "@built-in/tools/system-info"

session_store:
  type: sqlite
  path: "/workspace/data/sessions.db"
  ttl_days: 7
