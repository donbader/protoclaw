# Local dev override: build from workspace source instead of ghcr.io
# NOT used directly — use `make dev` which builds the base images first.
services:
  anyclaw:
    build:
      args:
        CORE_IMAGE: anyclaw-dev-core:latest
        EXT_IMAGE: anyclaw-dev-ext:latest
    volumes:
      - ./anyclaw.yaml:/anyclaw/anyclaw.yaml:ro

  kiro-agent-image:
    build:
      args:
        CORE_IMAGE: anyclaw-dev-core:latest
        EXT_IMAGE: anyclaw-dev-ext:latest
