# Local dev override: build from workspace source instead of ghcr.io
# NOT used directly — use `make dev` which builds the base image first.
services:
  anyclaw:
    build:
      context: ../../..
      dockerfile: examples/02-real-agent-telegram/kiro/Dockerfile.dev-builder
      target: example-02-kiro
    volumes:
      - ./anyclaw.yaml:/workspace/anyclaw.yaml:ro

  kiro-agent-image:
    build:
      context: ../../..
      dockerfile: examples/02-real-agent-telegram/kiro/Dockerfile.dev-builder
      target: kiro-agent
