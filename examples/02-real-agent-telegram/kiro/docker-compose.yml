services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      SECRETS: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - anyclaw-internal
    restart: unless-stopped

  anyclaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: example-02-kiro
    ports:
      - "8080:8080"
    volumes:
      - anyclaw-data:/anyclaw
    env_file:
      - .env
    networks:
      - anyclaw-internal
      - anyclaw-external
    depends_on:
      socket-proxy:
        condition: service_started
      kiro-agent-image:
        condition: service_completed_successfully
    restart: unless-stopped

  kiro-agent-image:
    build:
      context: .
      dockerfile: Dockerfile
      target: kiro-agent
    image: anyclaw-kiro-agent:latest
    entrypoint: ["true"]
    restart: "no"

volumes:
  anyclaw-data:

networks:
  anyclaw-internal:
    name: anyclaw-internal
    internal: true
  anyclaw-external:
    name: anyclaw-external
