# Local dev override: build anyclaw from workspace source instead of ghcr.io
# NOT auto-loaded. Use via:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  dev-base:
    build:
      context: ../../..
      dockerfile: examples/02-real-agent-telegram/Dockerfile.dev-builder
    image: anyclaw-dev-base:latest
    entrypoint: ["true"]
    restart: "no"

  anyclaw:
    build:
      context: ../../..
      dockerfile: examples/02-real-agent-telegram/opencode/Dockerfile.dev-builder
      target: example-02-opencode
    depends_on:
      dev-base:
        condition: service_completed_successfully

  opencode-agent-image:
    build:
      context: ../../..
      dockerfile: examples/02-real-agent-telegram/opencode/Dockerfile.dev-builder
      target: opencode-agent
    depends_on:
      dev-base:
        condition: service_completed_successfully
