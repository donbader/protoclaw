# Anyclaw Real Agent Example — Docker Workspace
# OpenCode runs in an isolated container managed by anyclaw via bollard.
# The agent uses direct ACP mode (opencode acp) — no wrapper binary needed.
# See ../AGENTS.md for adding new agent variants (e.g., Claude Code).
# See ../CONFIGURATION.md for the full config reference.

log_level: "debug,hyper=warn,reqwest=warn,h2=warn,hyper_util=warn,tower=warn"
extensions_dir: "/usr/local/bin"

agents_manager:
  acp_timeout_secs: 120
  agents:
    opencode:
      workspace:
        type: docker
        image: "anyclaw-opencode-agent:latest"
        entrypoint: ["opencode", "acp"]
        docker_host: "tcp://socket-proxy:2375"
        network: "anyclaw-external"
        working_dir: "/home/node/workspace"
        pull_policy: "never"
        volumes:
          - "opencode-agent-data:/home/node/.local/share"
          - "opencode-agent-workspace:/home/node/workspace"
          - "opencode-agent-packages:/usr/local"
        env:
          XDG_CONFIG_HOME: "/home/node/.config"
          XDG_DATA_HOME: "/home/node/.local/share"
      enabled: true
      tools:
        - "system-info"

channels_manager:
  channels:
    debug-http:
      binary: "@built-in/channels/debug-http"
      agent: "opencode"
      options:
        host: "0.0.0.0"
        port: "8080"
        ack:
          reaction: false
          typing: false
    telegram:
      binary: "@built-in/channels/telegram"
      enabled: "${TELEGRAM_ENABLED:false}"
      agent: "opencode"
      options:
        bot_token: "${TELEGRAM_BOT_TOKEN:}"
        ack:
          reaction: true
          reaction_emoji: "👀"
          typing: true
          reaction_lifecycle: "remove"

tools_manager:
  tools_server_host: "anyclaw"
  tools:
    system-info:
      binary: "@built-in/tools/system-info"

session_store:
  type: sqlite
  path: "/workspace/data/sessions.db"
  ttl_days: 7

supervisor:
  shutdown_timeout_secs: 30
  health_check_interval_secs: 5
  max_restarts: 5
  restart_window_secs: 60
