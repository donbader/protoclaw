# Protoclaw Telegram Bot Example
# Copy this directory to your project and run: docker compose up

[agent]
binary = "protoclaw"
args = ["acp"]
working_dir = "/workspace"

[agent.env]

[[channels]]
name = "telegram"
binary = "telegram-channel"

[supervisor]
shutdown_timeout_secs = 30
health_check_interval_secs = 5
max_restarts = 5
restart_window_secs = 60
