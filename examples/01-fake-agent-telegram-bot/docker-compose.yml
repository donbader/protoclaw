services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      SECRETS: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - protoclaw-internal
    restart: unless-stopped

  protoclaw:
    image: ghcr.io/donbader/protoclaw-builder:latest
    ports:
      - "8080:8080"
    volumes:
      - ./protoclaw.yaml:/workspace/protoclaw.yaml:ro
    environment:
      - LOG_LEVEL=debug
      - PORT=8080
      - HOST=0.0.0.0
      - DOCKER_HOST=tcp://socket-proxy:2375
    env_file:
      - .env
    networks:
      - protoclaw-internal
      - protoclaw-external
    depends_on:
      socket-proxy:
        condition: service_started
      mock-agent-image:
        condition: service_completed_successfully
    restart: unless-stopped

  mock-agent-image:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    image: protoclaw-mock-agent:latest
    entrypoint: ["true"]
    restart: "no"

networks:
  protoclaw-internal:
    name: protoclaw-internal
    internal: true
  protoclaw-external:
    name: protoclaw-external
