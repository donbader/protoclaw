services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      SECRETS: 0
      BUILD: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - anyclaw-internal
    restart: unless-stopped

  anyclaw:
    image: ghcr.io/donbader/anyclaw-ext:latest
    ports:
      - "8080:8080"
    volumes:
      - ./anyclaw.yaml:/workspace/anyclaw.yaml:ro
    environment:
      - LOG_LEVEL=debug
      - PORT=8080
      - HOST=0.0.0.0
      - DOCKER_HOST=tcp://socket-proxy:2375
    env_file:
      - .env
    networks:
      - anyclaw-internal
      - anyclaw-external
    depends_on:
      socket-proxy:
        condition: service_started
      mock-agent-image:
        condition: service_completed_successfully
    restart: unless-stopped

  mock-agent-image:
    build:
      context: .
      dockerfile: Dockerfile.mock-agent
    image: anyclaw-mock-agent:latest
    entrypoint: ["true"]
    restart: "no"

networks:
  anyclaw-internal:
    name: anyclaw-internal
    internal: true
  anyclaw-external:
    name: anyclaw-external
