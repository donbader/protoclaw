services:
  protoclaw:
    build:
      context: ../..
      dockerfile: examples/01-fake-agent-telegram-bot/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./protoclaw.toml:/workspace/protoclaw.toml:ro
    environment:
      - LOG_LEVEL=debug
      - PORT=8080
      - HOST=0.0.0.0
      - MOCK_AGENT_THINK=1
    env_file:
      - .env
    restart: unless-stopped
