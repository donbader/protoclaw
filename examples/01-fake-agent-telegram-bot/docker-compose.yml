services:
  protoclaw:
    build:
      context: ../..
      dockerfile: examples/01-fake-agent-telegram-bot/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./protoclaw.yaml:/workspace/protoclaw.yaml:ro
    environment:
      - LOG_LEVEL=debug
      - PORT=8080
      - HOST=0.0.0.0
    env_file:
      - .env
    restart: unless-stopped
