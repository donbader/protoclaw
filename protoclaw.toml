# Protoclaw configuration
# See: https://github.com/user/protoclaw for documentation

# Agent process — the ACP-speaking AI agent
[agent]
binary = "opencode"
args = []

# Channel subprocesses — user-facing interfaces
[[channels]]
name = "debug-http"
binary = "protoclaw-debug-http"
args = ["--port", "3000"]

# MCP tool servers — tools the agent can use
[[mcp_servers]]
name = "filesystem"
binary = "mcp-server-filesystem"
args = ["--root", "."]

# Supervisor settings
[supervisor]
shutdown_timeout_secs = 30
health_check_interval_secs = 5
max_restarts = 5
restart_window_secs = 60
