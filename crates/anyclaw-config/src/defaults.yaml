log_level: "info,hyper=warn,reqwest=warn,h2=warn,hyper_util=warn,tower=warn"
log_format: "pretty"
extensions_dir: "/usr/local/bin"

agents_manager:
  acp_timeout_secs: 30
  prompt_idle_timeout_secs: 120
  shutdown_grace_ms: 100

channels_manager:
  init_timeout_secs: 10
  exit_timeout_secs: 5

tools_manager:
  tools_server_host: "127.0.0.1"

supervisor:
  shutdown_timeout_secs: 30
  health_check_interval_secs: 5
  max_restarts: 5
  restart_window_secs: 60
  admin_port: 3000

session_store:
  type: none

