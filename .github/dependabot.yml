version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
      - "A-dependencies"
    open-pull-requests-limit: 5
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "A-dependencies"
    open-pull-requests-limit: 3
