name: Docker

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: /tmp/buildkit-cache
          key: cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.arch }}-

      - name: Inject cargo cache into builder
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "/usr/local/cargo/registry": "/tmp/buildkit-cache/registry",
              "/usr/local/cargo/git": "/tmp/buildkit-cache/git"
            }
          skip-extraction: ${{ !startsWith(github.ref, 'refs/tags/') }}

      # Build both targets sequentially — shares the builder stage via local cache
      - name: Build and push core
        id: core
        uses: docker/build-push-action@v7
        with:
          context: .
          target: core
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/donbader/protoclaw,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,scope=build-${{ matrix.platform }},mode=max

      - name: Build and push builder-export
        id: builder-export
        uses: docker/build-push-action@v7
        with:
          context: .
          target: builder-export
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/donbader/protoclaw-builder,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,scope=build-${{ matrix.platform }},mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/core /tmp/digests/builder-export
          core_digest="${{ steps.core.outputs.digest }}"
          builder_digest="${{ steps.builder-export.outputs.digest }}"
          touch "/tmp/digests/core/${core_digest#sha256:}"
          touch "/tmp/digests/builder-export/${builder_digest#sha256:}"

      - name: Upload core digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-core-${{ matrix.arch }}
          path: /tmp/digests/core/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload builder-export digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-builder-export-${{ matrix.arch }}
          path: /tmp/digests/builder-export/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest (${{ matrix.target }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: core
            image: ghcr.io/donbader/protoclaw
          - target: builder-export
            image: ghcr.io/donbader/protoclaw-builder
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }} --raw)
          AMD64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')
          ARM64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="arm64") | .digest')
          if [ -z "$AMD64" ] || [ -z "$ARM64" ]; then
            echo "ERROR: Missing platform in manifest"
            echo "amd64: $AMD64"
            echo "arm64: $ARM64"
            exit 1
          fi
          echo "Multi-arch verified: amd64=$AMD64 arm64=$ARM64"
