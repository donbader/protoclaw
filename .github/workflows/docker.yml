name: Docker

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build (${{ matrix.target }}, ${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - target: core
            image: ghcr.io/donbader/protoclaw
            platform: linux/amd64
            runner: ubuntu-latest
          - target: core
            image: ghcr.io/donbader/protoclaw
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - target: builder-export
            image: ghcr.io/donbader/protoclaw-builder
            platform: linux/amd64
            runner: ubuntu-latest
          - target: builder-export
            image: ghcr.io/donbader/protoclaw-builder
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.target }}-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.target }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.target }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/${{ matrix.target }}/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest (${{ matrix.target }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: core
            image: ghcr.io/donbader/protoclaw
          - target: builder-export
            image: ghcr.io/donbader/protoclaw-builder
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.target }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-${{ matrix.target }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }} --raw)
          AMD64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')
          ARM64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="arm64") | .digest')
          if [ -z "$AMD64" ] || [ -z "$ARM64" ]; then
            echo "ERROR: Missing platform in manifest"
            echo "amd64: $AMD64"
            echo "arm64: $ARM64"
            exit 1
          fi
          echo "Multi-arch verified: amd64=$AMD64 arm64=$ARM64"
