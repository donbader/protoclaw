name: Coverage

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE-*"
      - ".github/workflows/ghcr-cleanup.yml"
      - ".github/workflows/docker.yml"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage
      - name: Build required binaries
        run: cargo build --locked --bin mock-agent --bin debug-http --bin sdk-test-tool --bin sdk-test-channel
      - name: Run tests with coverage
        run: cargo llvm-cov --no-report --workspace --exclude protoclaw-test-helpers
      - name: Generate LCOV report
        run: |
          mkdir -p coverage
          cargo llvm-cov report --lcov --output-path coverage/lcov.info
      - name: Enforce coverage baseline
        run: |
          BASELINE=$(cat .coverage-baseline)
          echo "Enforcing coverage baseline: ${BASELINE}%"
          cargo llvm-cov report --fail-under-lines "$BASELINE"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
