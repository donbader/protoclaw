name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE-*"
      - ".github/workflows/ghcr-cleanup.yml"
      - ".github/workflows/docker.yml"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE-*"
      - ".github/workflows/ghcr-cleanup.yml"
      - ".github/workflows/docker.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Fmt check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --workspace -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Check docs build
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Build required binaries
        run: cargo build --locked --bin mock-agent --bin debug-http --bin sdk-test-tool --bin sdk-test-channel
      - name: Run tests
        run: cargo nextest run --locked --workspace

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: msrv
      - name: Check MSRV
        run: cargo check --locked --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  validate-examples:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Validate docker-compose files
        run: |
          for f in examples/*/docker-compose.yml; do
            echo "Validating $f..."
            dir=$(dirname "$f")
            if [ ! -f "$dir/.env" ] && [ -f "$dir/.env.example" ]; then
              cp "$dir/.env.example" "$dir/.env"
            fi
            docker compose -f "$f" config --quiet
          done

  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Build test binaries
        run: cargo build --locked --bin mock-agent --bin debug-http
      - name: Run Docker integration tests
        run: cargo test --locked -p anyclaw-integration-tests -- --ignored --test-threads=1
