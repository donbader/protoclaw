name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build required binaries
        run: cargo build --bin mock-agent --bin debug-http
      - name: Run tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Fmt check
        run: cargo fmt --all -- --check

  validate-examples:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose files
        run: |
          for f in examples/*/docker-compose.yml; do
            echo "Validating $f..."
            # Create .env from .env.example if missing (compose requires env_file)
            dir=$(dirname "$f")
            if [ ! -f "$dir/.env" ] && [ -f "$dir/.env.example" ]; then
              cp "$dir/.env.example" "$dir/.env"
            fi
            docker compose -f "$f" config --quiet
          done

  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build test binaries
        run: cargo build --bin mock-agent --bin debug-http
      - name: Run Docker integration tests
        run: cargo test -p protoclaw-integration-tests -- --ignored --test-threads=1
