name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!LICENSE-*'
              - '!.github/workflows/ghcr-cleanup.yml'
              - '!.github/workflows/release.yml'

  lint:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Fmt check
        run: |
          cargo fmt --all -- --check
          cargo fmt --all --manifest-path ext/Cargo.toml -- --check
      - name: Clippy
        run: |
          cargo clippy --locked --workspace -- -D warnings
          cargo clippy --locked --workspace --manifest-path ext/Cargo.toml -- -D warnings

  doc:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Check docs build
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo doc --no-deps --workspace
          cargo doc --no-deps --workspace --manifest-path ext/Cargo.toml

  test:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - name: Build ext/ binaries
        run: cargo build --locked --workspace --manifest-path ext/Cargo.toml
      - name: Run root workspace tests
        run: cargo nextest run --locked --workspace
      - name: Run ext/ workspace tests
        run: cargo nextest run --locked --workspace --manifest-path ext/Cargo.toml

  msrv:
    name: MSRV (1.94)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: msrv
      - name: Check MSRV
        run: |
          cargo check --locked --workspace
          cargo check --locked --workspace --manifest-path ext/Cargo.toml

  deny:
    name: cargo-deny
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

  validate-examples:
    needs: [test]
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate docker-compose files
        run: |
          for f in examples/*/docker-compose.yml; do
            echo "Validating $f..."
            dir=$(dirname "$f")
            if [ ! -f "$dir/.env" ] && [ -f "$dir/.env.example" ]; then
              cp "$dir/.env.example" "$dir/.env"
            fi
            docker compose -f "$f" config --quiet
          done

  docker-tests:
    name: Docker Integration Tests
    needs: [test]
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Build test binaries
        run: |
          cargo build --locked --bin mock-agent --bin debug-http --manifest-path ext/Cargo.toml
      - name: Run Docker integration tests
        run: cargo test --locked -p anyclaw-integration-tests -- --ignored --test-threads=1

  ci-pass:
    name: CI Result
    if: always()
    needs: [lint, doc, test, msrv, deny, validate-examples, docker-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.doc.result }}"
            "${{ needs.test.result }}"
            "${{ needs.msrv.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.validate-examples.result }}"
            "${{ needs.docker-tests.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Job failed with result: $r"
              exit 1
            fi
          done
          echo "All CI jobs passed (or were skipped for non-code changes)"
