name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build required binaries
        run: cargo build --locked --bin mock-agent --bin debug-http --bin sdk-test-tool --bin sdk-test-channel
      - name: Run tests
        run: cargo test --locked --workspace
      - name: Clippy
        run: cargo clippy --locked --workspace -- -D warnings
      - name: Fmt check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install MSRV toolchain
        run: rustup toolchain install 1.94 --no-self-update --profile minimal
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msrv-
      - name: Check MSRV
        run: cargo +1.94 check --locked --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Run audit
        run: cargo audit

  validate-examples:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Validate docker-compose files
        run: |
          for f in examples/*/docker-compose.yml; do
            echo "Validating $f..."
            # Create .env from .env.example if missing (compose requires env_file)
            dir=$(dirname "$f")
            if [ ! -f "$dir/.env" ] && [ -f "$dir/.env.example" ]; then
              cp "$dir/.env.example" "$dir/.env"
            fi
            docker compose -f "$f" config --quiet
          done

  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build test binaries
        run: cargo build --locked --bin mock-agent --bin debug-http
      - name: Run Docker integration tests
        run: cargo test --locked -p protoclaw-integration-tests -- --ignored --test-threads=1
