name: Release — Publish
run-name: "Publish release ${{ github.event.pull_request.head.ref }}"

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  resolve:
    name: Resolve version
    if: github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from branch $BRANCH"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  tag:
    name: Create tag
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Pull release commit
        run: git pull origin main

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' crates/anyclaw/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ needs.resolve.outputs.version }}" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match release version (${{ needs.resolve.outputs.version }})"
            exit 1
          fi

      - name: Create git tag
        run: |
          git tag "v${{ needs.resolve.outputs.version }}"
          git push origin "v${{ needs.resolve.outputs.version }}"

  build:
    name: Build (${{ matrix.arch }})
    needs: [resolve, tag]
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.resolve.outputs.version }}

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export sccache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build and push core
        id: core
        uses: docker/build-push-action@v7
        with:
          context: .
          target: core
          platforms: ${{ matrix.platform }}
          build-args: |
            SCCACHE_GHA_ENABLED=true
            ANYCLAW_VERSION=${{ needs.resolve.outputs.version }}
          secrets: |
            actions_results_url=${{ env.ACTIONS_RESULTS_URL }}
            actions_runtime_token=${{ env.ACTIONS_RUNTIME_TOKEN }}
          outputs: type=image,name=ghcr.io/donbader/anyclaw,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/donbader/anyclaw:cache-core-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/donbader/anyclaw:cache-core-${{ matrix.arch }},mode=max

      - name: Build and push ext
        id: ext
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ext/Dockerfile
          target: ext
          platforms: ${{ matrix.platform }}
          build-args: |
            SCCACHE_GHA_ENABLED=true
          secrets: |
            actions_results_url=${{ env.ACTIONS_RESULTS_URL }}
            actions_runtime_token=${{ env.ACTIONS_RUNTIME_TOKEN }}
          outputs: type=image,name=ghcr.io/donbader/anyclaw-ext,push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=registry,ref=ghcr.io/donbader/anyclaw:cache-ext-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/donbader/anyclaw:cache-ext-${{ matrix.arch }},mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/core /tmp/digests/ext
          core_digest="${{ steps.core.outputs.digest }}"
          ext_digest="${{ steps.ext.outputs.digest }}"
          touch "/tmp/digests/core/${core_digest#sha256:}"
          touch "/tmp/digests/ext/${ext_digest#sha256:}"

      - name: Upload core digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-core-${{ matrix.arch }}
          path: /tmp/digests/core/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload ext digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-ext-${{ matrix.arch }}
          path: /tmp/digests/ext/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest (${{ matrix.target }})
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: core
            image: ghcr.io/donbader/anyclaw
          - target: ext
            image: ghcr.io/donbader/anyclaw-ext
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tags
        id: version
        run: |
          MAJOR_MINOR=$(echo "${{ needs.resolve.outputs.version }}" | cut -d. -f1,2)
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }} --raw)
          AMD64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')
          ARM64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="arm64") | .digest')
          if [ -z "$AMD64" ] || [ -z "$ARM64" ]; then
            echo "ERROR: Missing platform in manifest"
            echo "amd64: $AMD64"
            echo "arm64: $ARM64"
            exit 1
          fi
          echo "Multi-arch verified: amd64=$AMD64 arm64=$ARM64"
