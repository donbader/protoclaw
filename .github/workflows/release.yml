name: Release
run-name: "Release v${{ inputs.version || '(auto)' }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.10.0) — leave empty to auto-detect from commits"
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using provided version: ${{ inputs.version }}"
            exit 0
          fi

          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "ERROR: No existing v* tags found. Provide version explicitly."
            exit 1
          fi

          CURRENT=$(echo "$LAST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          HAS_FEAT=$(git log "$LAST_TAG"..HEAD --format='%s' --no-merges | grep -c '^feat' || true)
          if [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Auto-detected version: $VERSION (from $LAST_TAG)"

      - name: Check tag doesn't exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Bump Cargo.toml version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" crates/anyclaw/Cargo.toml
          cargo generate-lockfile

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag "v${{ steps.version.outputs.version }}" --prepend CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog links
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')

          # Update [Unreleased] compare link
          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/donbader/anyclaw/compare/v${VERSION}...HEAD|" CHANGELOG.md

          # Add version compare link if not present
          if ! grep -q "^\[${VERSION}\]:" CHANGELOG.md; then
            sed -i "/^\[Unreleased\]:/a [${VERSION}]: https://github.com/donbader/anyclaw/compare/v${LAST_TAG}...v${VERSION}" CHANGELOG.md
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.lock crates/anyclaw/Cargo.toml
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git push origin main

  tag:
    name: Create tag
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Pull release commit
        run: git pull origin main

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' crates/anyclaw/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ needs.prepare.outputs.version }}" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match release version (${{ needs.prepare.outputs.version }})"
            exit 1
          fi

      - name: Create git tag
        run: |
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

  build:
    name: Build (${{ matrix.arch }})
    needs: [prepare, tag]
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export sccache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build and push core
        id: core
        uses: docker/build-push-action@v7
        with:
          context: .
          target: core
          platforms: ${{ matrix.platform }}
          build-args: |
            SCCACHE_GHA_ENABLED=true
            ANYCLAW_VERSION=${{ inputs.version }}
          secrets: |
            actions_results_url=${{ env.ACTIONS_RESULTS_URL }}
            actions_runtime_token=${{ env.ACTIONS_RUNTIME_TOKEN }}
          outputs: type=image,name=ghcr.io/donbader/anyclaw,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/donbader/anyclaw:cache-core-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/donbader/anyclaw:cache-core-${{ matrix.arch }},mode=max

      - name: Build and push builder-export
        id: builder-export
        uses: docker/build-push-action@v7
        with:
          context: .
          target: builder-export
          platforms: ${{ matrix.platform }}
          build-args: |
            SCCACHE_GHA_ENABLED=true
            ANYCLAW_VERSION=${{ inputs.version }}
          secrets: |
            actions_results_url=${{ env.ACTIONS_RESULTS_URL }}
            actions_runtime_token=${{ env.ACTIONS_RUNTIME_TOKEN }}
          outputs: type=image,name=ghcr.io/donbader/anyclaw-builder,push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=registry,ref=ghcr.io/donbader/anyclaw:cache-builder-${{ matrix.arch }}
            type=registry,ref=ghcr.io/donbader/anyclaw:cache-core-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/donbader/anyclaw:cache-builder-${{ matrix.arch }},mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests/core /tmp/digests/builder-export
          core_digest="${{ steps.core.outputs.digest }}"
          builder_digest="${{ steps.builder-export.outputs.digest }}"
          touch "/tmp/digests/core/${core_digest#sha256:}"
          touch "/tmp/digests/builder-export/${builder_digest#sha256:}"

      - name: Upload core digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-core-${{ matrix.arch }}
          path: /tmp/digests/core/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload builder-export digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-builder-export-${{ matrix.arch }}
          path: /tmp/digests/builder-export/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest (${{ matrix.target }})
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: core
            image: ghcr.io/donbader/anyclaw
          - target: builder-export
            image: ghcr.io/donbader/anyclaw-builder
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.target }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tags
        id: version
        run: |
          MAJOR_MINOR=$(echo "${{ needs.prepare.outputs.version }}" | cut -d. -f1,2)
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=sha,prefix=
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 10m

      - name: Verify multi-arch manifest
        run: |
          MANIFEST=$(docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.meta.outputs.version }} --raw)
          AMD64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')
          ARM64=$(echo "$MANIFEST" | jq -r '.manifests[] | select(.platform.architecture=="arm64") | .digest')
          if [ -z "$AMD64" ] || [ -z "$ARM64" ]; then
            echo "ERROR: Missing platform in manifest"
            echo "amd64: $AMD64"
            echo "arm64: $ARM64"
            exit 1
          fi
          echo "Multi-arch verified: amd64=$AMD64 arm64=$ARM64"
