name: Release Extensions
run-name: "Release Extensions — ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
    paths:
      - "ext/**"

permissions:
  contents: write

jobs:
  tag:
    name: Tag new versions
    runs-on: ubuntu-latest
    concurrency:
      group: release-ext-tag
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag extension releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Extension crates to tag: name, manifest path, tag prefix
          declare -A CRATES=(
            ["mock-agent"]="ext/agents/mock-agent/Cargo.toml"
            ["debug-http"]="ext/channels/debug-http/Cargo.toml"
            ["telegram-channel"]="ext/channels/telegram/Cargo.toml"
            ["system-info"]="ext/tools/system-info/Cargo.toml"
          )

          created=0
          for name in "${!CRATES[@]}"; do
            manifest="${CRATES[$name]}"
            if [ ! -f "$manifest" ]; then
              echo "::warning::Manifest not found: $manifest"
              continue
            fi

            version=$(grep '^version' "$manifest" | head -1 | sed 's/.*"\(.*\)"/\1/')
            tag="${name}-v${version}"

            if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists, skipping"
              continue
            fi

            echo "Creating tag ${tag}"
            git tag "$tag"
            git push origin "$tag"

            # Create GitHub release
            gh release create "$tag" \
              --title "${name} v${version}" \
              --generate-notes \
              --latest=false

            created=$((created + 1))
          done

          echo "Created ${created} new tag(s)"
