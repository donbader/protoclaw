name: Release SDK
run-name: "Release SDK — ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE-*"
      - ".github/workflows/ghcr-cleanup.yml"
      - ".github/workflows/release-prepare.yml"
      - ".github/workflows/release-publish.yml"

permissions:
  pull-requests: write
  contents: write
  id-token: write

jobs:
  release-plz-release:
    name: Publish
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Generate crates.io token (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-stable
          save-if: false
      - name: Run release-plz release-pr
        id: release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync ext/Cargo.lock in release PR
        if: ${{ steps.release-pr.outputs.prs_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=${{ fromJSON(steps.release-pr.outputs.pr).number }}
          gh pr checkout "$pr_number"
          cargo update --manifest-path ext/Cargo.toml
          if git diff --quiet ext/Cargo.lock; then
            echo "ext/Cargo.lock unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ext/Cargo.lock
            git commit -m "chore: sync ext/Cargo.lock after SDK version bump"
            git push
          fi
