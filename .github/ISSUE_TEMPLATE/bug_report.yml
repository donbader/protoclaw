name: Bug Report
description: Report a bug in protoclaw
labels: ["C-bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: Version
      description: "protoclaw version (cargo build output or docker image tag)"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened? What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps to reproduce the issue"
      placeholder: |
        1. Configure protoclaw.yaml with...
        2. Run `protoclaw run`
        3. Send a message via...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: "Paste any relevant log output (use RUST_LOG=debug for verbose output)"
      render: shell
